<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORPSE MOUTH — RELEASES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blood: #8b0000;
  --ember: #c0392b;
  --rust: #7f1a1a;
  --ash: #1a0a0a;
  --soot: #0d0505;
  --bone: #d4c4b0;
  --dim:  rgba(212,196,176,0.45);
  --fog:  rgba(139,0,0,0.18);
}

body {
  background: var(--soot);
  overflow: hidden;
  width: 100vw; height: 100vh;
  font-family: 'Share Tech Mono', monospace;
  cursor: crosshair;
}

/* ── CANVAS ── */
#three-canvas {
  position: fixed; inset: 0;
  z-index: 0;
}

/* ── SCANLINES ── */
#scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 10;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px
  );
}

/* ── VIGNETTE ── */
#vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 11;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(139,0,0,0.3);
  background: linear-gradient(to bottom, rgba(13,5,5,0.95), transparent);
}
#header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(18px, 3vw, 28px);
  letter-spacing: 8px;
  color: var(--bone);
  text-shadow: 0 0 20px rgba(139,0,0,0.8);
}
#header-sub {
  font-size: 9px; letter-spacing: 4px;
  color: var(--ember); opacity: 0.7;
  text-transform: uppercase;
}
#back-btn {
  font-size: 9px; letter-spacing: 3px;
  color: var(--dim); text-decoration: none;
  border: 1px solid rgba(212,196,176,0.2);
  padding: 7px 14px;
  transition: all 0.2s ease;
}
#back-btn:hover {
  color: var(--bone);
  border-color: var(--bone);
  background: rgba(212,196,176,0.05);
}

/* ── HUD NAVIGATION ── */
.hud-btn {
  position: fixed; top: 50%; z-index: 50;
  transform: translateY(-50%);
  width: 44px; height: 44px;
  border: 1px solid rgba(139,0,0,0.6);
  background: rgba(13,5,5,0.8);
  color: var(--ember);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
}
#btn-prev { left: 24px; }
#btn-next { right: 24px; }
.hud-btn:hover {
  border-color: var(--blood);
  background: rgba(139,0,0,0.25);
  color: var(--bone);
  box-shadow: 0 0 18px rgba(139,0,0,0.5), inset 0 0 12px rgba(139,0,0,0.15);
}
.hud-btn:active { transform: translateY(-50%) scale(0.93); }
.hud-btn svg { width: 18px; height: 18px; fill: currentColor; }

/* ── IFRAME CONTAINER (DOM overlay) ── */
#iframe-wrapper {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 20; pointer-events: none;
}
#iframe-container {
  position: relative;
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  /* Clip to inner opening of gold frame — frame bars are ~42px each side */
  clip-path: inset(0px 0px 0px 0px);
}
#iframe-container.visible {
  opacity: 1;
  transform: scale(1);
  pointer-events: all;
}

#active-iframe {
  display: block;
  border: 0;
  background: transparent;
}

/* ── LOADING OVERLAY ── */
#loading {
  position: fixed; inset: 0; z-index: 200;
  background: var(--soot);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  transition: opacity 0.8s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; letter-spacing: 12px;
  color: var(--blood);
  text-shadow: 0 0 30px rgba(139,0,0,0.6);
  animation: flicker 1.8s infinite;
}
#loading-bar {
  width: 200px; height: 1px;
  background: rgba(139,0,0,0.2);
  position: relative; overflow: hidden;
}
#loading-bar::after {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: var(--blood);
  animation: loadbar 1.5s ease-in-out forwards;
}
@keyframes loadbar { to { left: 0; } }
@keyframes flicker {
  0%,100%{opacity:1} 8%{opacity:.4} 10%{opacity:1} 60%{opacity:1} 62%{opacity:.3} 64%{opacity:1}
}

/* ── COORD DISPLAY ── */
#coord-display {
  position: fixed; top: 70px; right: 24px;
  z-index: 50;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(139,0,0,0.5);
  line-height: 1.8;
  text-align: right;
}

/* ── CORNER MARKS ── */
.corner {
  position: fixed; width: 24px; height: 24px;
  z-index: 50; pointer-events: none;
  opacity: 0.3;
}
.corner-tl { top: 60px; left: 10px; border-top: 1px solid var(--blood); border-left: 1px solid var(--blood); }
.corner-tr { top: 60px; right: 10px; border-top: 1px solid var(--blood); border-right: 1px solid var(--blood); }
.corner-bl { bottom: 10px; left: 10px; border-bottom: 1px solid var(--blood); border-left: 1px solid var(--blood); }
.corner-br { bottom: 10px; right: 10px; border-bottom: 1px solid var(--blood); border-right: 1px solid var(--blood); }

/* ── KEYBOARD HINT ── */
#key-hint {
  position: fixed; top: 70px; left: 32px;
  z-index: 50;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(212,196,176,0.2);
  line-height: 2;
}
</style>
</head>
<body>

<div id="loading">
  <div id="loading-text">CORPSE MOUTH</div>
  <div id="loading-bar"></div>
</div>

<canvas id="three-canvas"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<header id="header">
  <div>
    <div id="header-title">CORPSE MOUTH</div>
    <div id="header-sub">Releases — Archive</div>
  </div>
  <a href="../vault/" id="back-btn">← VAULT</a>
</header>

<div id="key-hint">
  ← → NAVIGATE<br>
  KEYBOARD ARROWS
</div>

<div id="coord-display">
  X: <span id="cx">0.00</span><br>
  Y: <span id="cy">0.00</span><br>
  Z: <span id="cz">0.00</span>
</div>

<div id="iframe-wrapper">
  <div id="iframe-container">
    <iframe id="active-iframe" src="" width="350" height="470" scrolling="no"></iframe>
  </div>
</div>

<button class="hud-btn" id="btn-prev">
  <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
</button>
<button class="hud-btn" id="btn-next">
  <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const RELEASES = [
  { title: "OF A MAD GOD",           src: "https://bandcamp.com/EmbeddedPlayer/track=1748462688/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "OBSESSION EP",           src: "https://bandcamp.com/EmbeddedPlayer/album=2957680617/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "120 DAYS OF SODOM",      src: "https://bandcamp.com/EmbeddedPlayer/album=3060165123/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "ANGELMAKER",             src: "https://bandcamp.com/EmbeddedPlayer/track=2996466389/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "NUCLEAR WINTER // REGRESSION", src: "https://bandcamp.com/EmbeddedPlayer/track=2272334278/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "HATE",                   src: "https://bandcamp.com/EmbeddedPlayer/track=1230165177/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "AND OUR BONES SHALL ROT EP", src: "https://bandcamp.com/EmbeddedPlayer/album=2773660087/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "BEYOND SILENT HILLS EP", src: "https://bandcamp.com/EmbeddedPlayer/album=758937116/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "SLAUGHTERHOUSE BLUES",   src: "https://bandcamp.com/EmbeddedPlayer/track=722976963/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "PIG SUIT",               src: "https://bandcamp.com/EmbeddedPlayer/track=2374666027/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "F25.9",                  src: "https://bandcamp.com/EmbeddedPlayer/album=2955075972/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "MISANTHROPOCENE EP",     src: "https://bandcamp.com/EmbeddedPlayer/album=2508178849/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
];

// ── 3D POSITIONS (Ausstellungshalle: verteilt im Raum, aber geordnet) ──
const POSITIONS = [
  new THREE.Vector3(-8,  1.5, -6),
  new THREE.Vector3( 5,  0,   -12),
  new THREE.Vector3(-3, -1,   -20),
  new THREE.Vector3( 9,  2,   -28),
  new THREE.Vector3(-10, 0,   -36),
  new THREE.Vector3( 2,  1.5, -44),
  new THREE.Vector3(-6, -1,   -52),
  new THREE.Vector3( 8,  0,   -60),
  new THREE.Vector3(-4,  2,   -68),
  new THREE.Vector3( 6, -1,   -76),
  new THREE.Vector3(-9,  0.5, -84),
  new THREE.Vector3( 3,  1,   -92),
];

// ── THREE SETUP ──
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0d0505, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a0000, 0.022);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 4);

// ── LIGHTS ──
const ambientLight = new THREE.AmbientLight(0x1a0800, 1.2);
scene.add(ambientLight);

const bloodLight1 = new THREE.PointLight(0x8b0000, 2, 30);
bloodLight1.position.set(0, 5, 0);
scene.add(bloodLight1);

// Warm overhead strip to make gold pop
const warmStrip = new THREE.DirectionalLight(0xffd080, 0.8);
warmStrip.position.set(0, 10, 5);
scene.add(warmStrip);

// ── FLOOR ──
const floorGeo = new THREE.PlaneGeometry(40, 200);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0d0000,
  roughness: 0.95,
  metalness: 0.1,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -3.5;
floor.position.z = -46;
scene.add(floor);

// ── GRID ON FLOOR ──
const gridHelper = new THREE.GridHelper(200, 40, 0x3d0000, 0x1a0000);
gridHelper.position.y = -3.49;
gridHelper.position.z = -46;
scene.add(gridHelper);

// ── CEILING ──
const ceilGeo = new THREE.PlaneGeometry(40, 200);
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x080000, roughness: 1 });
const ceil = new THREE.Mesh(ceilGeo, ceilMat);
ceil.rotation.x = Math.PI / 2;
ceil.position.y = 6;
ceil.position.z = -46;
scene.add(ceil);

// ── WALLS ──
function makeWall(x, rotY, zOffset) {
  const geo = new THREE.PlaneGeometry(200, 12);
  const mat = new THREE.MeshStandardMaterial({ color: 0x100000, roughness: 0.9, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.y = rotY;
  mesh.position.set(x, 1, zOffset);
  scene.add(mesh);
}
makeWall(-14, Math.PI / 2, -46);
makeWall( 14, -Math.PI / 2, -46);

// ── FRAME SIZE: calculate exact 3D units matching iframe pixels ──
function calcFrameInner(pxW, pxH, distZ) {
  const fovRad = (60 * Math.PI) / 180;
  const screenH = window.innerHeight;
  const screenW = window.innerWidth;
  const visH = 2 * Math.tan(fovRad / 2) * distZ;
  const visW = visH * (screenW / screenH);
  return {
    w: (pxW / screenW) * visW,
    h: (pxH / screenH) * visH,
  };
}

// ── GOLD FRAME BUILDER ──
function buildGoldFrame(pos, iframeH = 470) {
  const group = new THREE.Group();
  group.position.copy(pos);

  // Inner opening = exact iframe size projected at camera distance 5
  const { w: innerW, h: innerH } = calcFrameInner(350, iframeH, 5);
  const frameThickness = 0.55;

  const outerW = innerW + frameThickness * 2;
  const outerH = innerH + frameThickness * 2;

  // Gold material layers — outer to inner, each slightly recessed
  const goldLayers = [
    { shrink: 0.00, d: 0.22, color: 0xb8860b, roughness: 0.25, metalness: 0.95, z: 0.00 },
    { shrink: 0.15, d: 0.20, color: 0xd4a017, roughness: 0.20, metalness: 0.98, z: 0.06 },
    { shrink: 0.25, d: 0.18, color: 0xc8961a, roughness: 0.30, metalness: 0.92, z: 0.10 },
    { shrink: 0.35, d: 0.16, color: 0xe8c030, roughness: 0.15, metalness: 1.00, z: 0.13 },
    { shrink: 0.42, d: 0.14, color: 0xa07010, roughness: 0.40, metalness: 0.85, z: 0.15 },
  ];

  goldLayers.forEach(({ shrink, d, color, roughness, metalness, z }) => {
    const mat = new THREE.MeshStandardMaterial({ color, roughness, metalness, side: THREE.FrontSide });
    const w = outerW - shrink * 2;
    const h = outerH - shrink * 2;
    const iw = innerW + shrink * 2; // inner opening grows as frame shrinks
    const ih = innerH + shrink * 2;
    const barW = (w - iw) / 2;
    const barH = (h - ih) / 2;

    // Top bar
    const top = new THREE.Mesh(new THREE.BoxGeometry(w, barH, d), mat);
    top.position.set(0, ih / 2 + barH / 2, z);
    group.add(top);

    // Bottom bar
    const bot = top.clone();
    bot.position.set(0, -(ih / 2 + barH / 2), z);
    group.add(bot);

    // Left bar
    const left = new THREE.Mesh(new THREE.BoxGeometry(barW, ih, d), mat);
    left.position.set(-(iw / 2 + barW / 2), 0, z);
    group.add(left);

    // Right bar
    const right = left.clone();
    right.position.set(iw / 2 + barW / 2, 0, z);
    group.add(right);
  });



  // Spotlight from above
  const spot = new THREE.PointLight(0xffd090, 2.5, 20);
  spot.position.set(0, 4, 3);
  group.add(spot);

  // Warm fill from front
  const fill = new THREE.PointLight(0xc8a040, 1.2, 12);
  fill.position.set(0, 0, 4);
  group.add(fill);

  // Floor marker
  const markerGeo = new THREE.CircleGeometry(0.5, 4);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0x3d0000, transparent: true, opacity: 0.35 });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  marker.rotation.x = -Math.PI / 2;
  marker.position.set(0, -3.48 - pos.y, 0);
  group.add(marker);

  scene.add(group);
  return group;
}

const frameGroups = RELEASES.map((rel, i) => buildGoldFrame(POSITIONS[i], rel.h));

// ── PARTICLES (dust/spores) ──
const particleCount = 300;
const particleGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  pPos[i * 3]     = (Math.random() - 0.5) * 26;
  pPos[i * 3 + 1] = (Math.random() - 0.5) * 8 + 1;
  pPos[i * 3 + 2] = Math.random() * -96 - 2;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x8b0000, size: 0.06, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ── STATE ──
let current = 0;
let isAnimating = false;
const CAM_OFFSET = new THREE.Vector3(0, 0.4, 5);

// ── BUTTONS ──
document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
document.getElementById('btn-next').addEventListener('click', () => navigate(1));

// ── CAMERA ANIMATION ──
function flyTo(index, onDone) {
  if (isAnimating) return;
  isAnimating = true;

  iframeContainer.classList.remove('visible');

  const target = POSITIONS[index].clone().add(CAM_OFFSET);
  const startPos = camera.position.clone();
  const startLook = new THREE.Vector3(
    camera.position.x, camera.position.y, camera.position.z - 1
  );
  const endLook = POSITIONS[index].clone();

  const duration = 1400;
  const startTime = performance.now();

  function tick(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // ease in-out cubic
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    camera.position.lerpVectors(startPos, target, e);

    const look = new THREE.Vector3();
    look.lerpVectors(startLook, endLook, e);
    camera.lookAt(look);

    // update coord display
    document.getElementById('cx').textContent = camera.position.x.toFixed(2);
    document.getElementById('cy').textContent = camera.position.y.toFixed(2);
    document.getElementById('cz').textContent = camera.position.z.toFixed(2);

    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      camera.lookAt(POSITIONS[index]);
      isAnimating = false;
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(tick);
}

// ── IFRAME ──
const iframeContainer = document.getElementById('iframe-container');
const activeIframe    = document.getElementById('active-iframe');

function showRelease(index) {
  const rel = RELEASES[index];
  activeIframe.style.height = rel.h + 'px';
  activeIframe.src = rel.src;
  iframeContainer.classList.add('visible');
}

function navigate(dir) {
  if (isAnimating) return;
  const next = (current + dir + RELEASES.length) % RELEASES.length;
  current = next;
  flyTo(current, () => showRelease(current));
}

// ── BUTTONS ──
document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
document.getElementById('btn-next').addEventListener('click', () => navigate(1));

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// ── RESIZE ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── RENDER LOOP ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (!isAnimating && !iframeContainer.classList.contains('visible')) {
    const target = POSITIONS[current];
    const base = target.clone().add(CAM_OFFSET);
    camera.position.x = base.x + Math.sin(t * 0.3) * 0.08;
    camera.position.y = base.y + Math.sin(t * 0.2) * 0.05;
    camera.lookAt(target);
  }

  const pArray = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pArray[i * 3 + 1] += Math.sin(t + i) * 0.0008;
  }
  particleGeo.attributes.position.needsUpdate = true;

  scene.fog.density = 0.022 + Math.sin(t * 0.5) * 0.002;

  // Billboard: rotate each frame to face camera (Y + X axis)
  frameGroups.forEach(group => {
    const dx = camera.position.x - group.position.x;
    const dy = camera.position.y - group.position.y;
    const dz = camera.position.z - group.position.z;
    group.rotation.y = Math.atan2(dx, dz);
    const distXZ = Math.sqrt(dx * dx + dz * dz);
    group.rotation.x = -Math.atan2(dy, distXZ);
  });

  renderer.render(scene, camera);
}
animate();

// ── INIT ──
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
  flyTo(0, () => showRelease(0));
}, 1800);
</script>
</body>
</html>
