<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORPSE MOUTH — RELEASES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blood: #8b0000;
  --ember: #c0392b;
  --rust: #7f1a1a;
  --ash: #1a0a0a;
  --soot: #0d0505;
  --bone: #d4c4b0;
  --dim:  rgba(212,196,176,0.45);
  --fog:  rgba(139,0,0,0.18);
}

body {
  background: var(--soot);
  overflow: hidden;
  width: 100vw; height: 100vh;
  font-family: 'Share Tech Mono', monospace;
  cursor: crosshair;
}

/* ── CANVAS ── */
#three-canvas {
  position: fixed; inset: 0;
  z-index: 0;
}

/* ── SCANLINES ── */
#scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 10;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px
  );
}

/* ── VIGNETTE ── */
#vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 11;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(139,0,0,0.3);
  background: linear-gradient(to bottom, rgba(13,5,5,0.95), transparent);
}
#header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(18px, 3vw, 28px);
  letter-spacing: 8px;
  color: var(--bone);
  text-shadow: 0 0 20px rgba(139,0,0,0.8);
}
#header-sub {
  font-size: 9px; letter-spacing: 4px;
  color: var(--ember); opacity: 0.7;
  text-transform: uppercase;
}
#back-btn {
  font-size: 9px; letter-spacing: 3px;
  color: var(--dim); text-decoration: none;
  border: 1px solid rgba(212,196,176,0.2);
  padding: 7px 14px;
  transition: all 0.2s ease;
}
#back-btn:hover {
  color: var(--bone);
  border-color: var(--bone);
  background: rgba(212,196,176,0.05);
}

/* ── COUNTER ── */
#counter {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  font-size: 11px; letter-spacing: 4px;
  color: var(--ember); opacity: 0.8;
  text-align: center;
}
#counter-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 6px;
  color: var(--bone); display: block;
  text-shadow: 0 0 18px rgba(139,0,0,0.9);
}
#counter-title {
  display: block; margin-top: 3px;
  font-size: 10px; letter-spacing: 3px;
  color: rgba(212,196,176,0.5);
  max-width: 240px; text-align: center;
  text-transform: uppercase;
}

/* ── HUD NAVIGATION ── */
#hud {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex; align-items: center; gap: 10px;
}
.hud-btn {
  width: 44px; height: 44px;
  border: 1px solid rgba(139,0,0,0.6);
  background: rgba(13,5,5,0.8);
  color: var(--ember);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  position: relative;
  clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
}
.hud-btn:hover {
  border-color: var(--blood);
  background: rgba(139,0,0,0.25);
  color: var(--bone);
  box-shadow: 0 0 18px rgba(139,0,0,0.5), inset 0 0 12px rgba(139,0,0,0.15);
}
.hud-btn:active { transform: scale(0.93); }
.hud-btn svg { width: 18px; height: 18px; fill: currentColor; }

#hud-dots {
  display: flex; gap: 6px; align-items: center;
  padding: 0 8px;
}
.hud-dot {
  width: 5px; height: 5px;
  background: rgba(139,0,0,0.35);
  transition: all 0.3s ease;
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}
.hud-dot.active {
  background: var(--ember);
  box-shadow: 0 0 8px rgba(192,57,43,0.8);
  transform: scale(1.5);
}

/* ── IFRAME CONTAINER (DOM overlay) ── */
#iframe-wrapper {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 30; pointer-events: none;
}
#iframe-container {
  position: relative;
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  border: 1px solid rgba(139,0,0,0.5);
  box-shadow:
    0 0 40px rgba(139,0,0,0.4),
    0 0 80px rgba(139,0,0,0.15),
    inset 0 0 30px rgba(0,0,0,0.5);
}
#iframe-container.visible {
  opacity: 1;
  transform: scale(1);
  pointer-events: all;
}
#iframe-container::before,
#iframe-container::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--blood); border-style: solid;
  z-index: 1; pointer-events: none;
}
#iframe-container::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
#iframe-container::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

#active-iframe {
  display: block;
  border: 0;
  background: transparent;
}

/* ── LOADING OVERLAY ── */
#loading {
  position: fixed; inset: 0; z-index: 200;
  background: var(--soot);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  transition: opacity 0.8s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; letter-spacing: 12px;
  color: var(--blood);
  text-shadow: 0 0 30px rgba(139,0,0,0.6);
  animation: flicker 1.8s infinite;
}
#loading-bar {
  width: 200px; height: 1px;
  background: rgba(139,0,0,0.2);
  position: relative; overflow: hidden;
}
#loading-bar::after {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: var(--blood);
  animation: loadbar 1.5s ease-in-out forwards;
}
@keyframes loadbar { to { left: 0; } }
@keyframes flicker {
  0%,100%{opacity:1} 8%{opacity:.4} 10%{opacity:1} 60%{opacity:1} 62%{opacity:.3} 64%{opacity:1}
}

/* ── COORD DISPLAY ── */
#coord-display {
  position: fixed; top: 70px; right: 24px;
  z-index: 50;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(139,0,0,0.5);
  line-height: 1.8;
  text-align: right;
}

/* ── CORNER MARKS ── */
.corner {
  position: fixed; width: 24px; height: 24px;
  z-index: 50; pointer-events: none;
  opacity: 0.3;
}
.corner-tl { top: 60px; left: 10px; border-top: 1px solid var(--blood); border-left: 1px solid var(--blood); }
.corner-tr { top: 60px; right: 10px; border-top: 1px solid var(--blood); border-right: 1px solid var(--blood); }
.corner-bl { bottom: 10px; left: 10px; border-bottom: 1px solid var(--blood); border-left: 1px solid var(--blood); }
.corner-br { bottom: 10px; right: 10px; border-bottom: 1px solid var(--blood); border-right: 1px solid var(--blood); }

/* ── KEYBOARD HINT ── */
#key-hint {
  position: fixed; top: 70px; left: 32px;
  z-index: 50;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(212,196,176,0.2);
  line-height: 2;
}
</style>
</head>
<body>

<div id="loading">
  <div id="loading-text">CORPSE MOUTH</div>
  <div id="loading-bar"></div>
</div>

<canvas id="three-canvas"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<header id="header">
  <div>
    <div id="header-title">CORPSE MOUTH</div>
    <div id="header-sub">Releases — Archive</div>
  </div>
  <a href="../vault/" id="back-btn">← VAULT</a>
</header>

<div id="key-hint">
  ← → NAVIGATE<br>
  KEYBOARD ARROWS
</div>

<div id="coord-display">
  X: <span id="cx">0.00</span><br>
  Y: <span id="cy">0.00</span><br>
  Z: <span id="cz">0.00</span>
</div>

<div id="iframe-wrapper">
  <div id="iframe-container">
    <iframe id="active-iframe" src="" width="350" height="470" scrolling="no"></iframe>
  </div>
</div>

<div id="counter">
  <span id="counter-num">01 / 12</span>
  <span id="counter-title">Loading...</span>
</div>

<nav id="hud">
  <button class="hud-btn" id="btn-prev" title="Vorheriger">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div id="hud-dots"></div>
  <button class="hud-btn" id="btn-next" title="Nächster">
    <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
  </button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const RELEASES = [
  { title: "OF A MAD GOD",           src: "https://bandcamp.com/EmbeddedPlayer/track=1748462688/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "OBSESSION EP",           src: "https://bandcamp.com/EmbeddedPlayer/album=2957680617/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "120 DAYS OF SODOM",      src: "https://bandcamp.com/EmbeddedPlayer/album=3060165123/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "ANGELMAKER",             src: "https://bandcamp.com/EmbeddedPlayer/track=2996466389/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "NUCLEAR WINTER // REGRESSION", src: "https://bandcamp.com/EmbeddedPlayer/track=2272334278/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "HATE",                   src: "https://bandcamp.com/EmbeddedPlayer/track=1230165177/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "AND OUR BONES SHALL ROT EP", src: "https://bandcamp.com/EmbeddedPlayer/album=2773660087/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "BEYOND SILENT HILLS EP", src: "https://bandcamp.com/EmbeddedPlayer/album=758937116/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "SLAUGHTERHOUSE BLUES",   src: "https://bandcamp.com/EmbeddedPlayer/track=722976963/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "PIG SUIT",               src: "https://bandcamp.com/EmbeddedPlayer/track=2374666027/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 442 },
  { title: "F25.9",                  src: "https://bandcamp.com/EmbeddedPlayer/album=2955075972/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
  { title: "MISANTHROPOCENE EP",     src: "https://bandcamp.com/EmbeddedPlayer/album=2508178849/size=large/bgcol=1a0000/linkcol=c0392b/tracklist=false/transparent=true/", h: 470 },
];

// ── 3D POSITIONS (Ausstellungshalle: verteilt im Raum, aber geordnet) ──
const POSITIONS = [
  new THREE.Vector3(-8,  1.5, -6),
  new THREE.Vector3( 5,  0,   -12),
  new THREE.Vector3(-3, -1,   -20),
  new THREE.Vector3( 9,  2,   -28),
  new THREE.Vector3(-10, 0,   -36),
  new THREE.Vector3( 2,  1.5, -44),
  new THREE.Vector3(-6, -1,   -52),
  new THREE.Vector3( 8,  0,   -60),
  new THREE.Vector3(-4,  2,   -68),
  new THREE.Vector3( 6, -1,   -76),
  new THREE.Vector3(-9,  0.5, -84),
  new THREE.Vector3( 3,  1,   -92),
];

// ── THREE SETUP ──
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0d0505, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a0000, 0.022);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 4);

// ── LIGHTS ──
const ambientLight = new THREE.AmbientLight(0x330000, 0.8);
scene.add(ambientLight);

const bloodLight1 = new THREE.PointLight(0x8b0000, 3, 30);
bloodLight1.position.set(0, 5, 0);
scene.add(bloodLight1);

// ── FLOOR ──
const floorGeo = new THREE.PlaneGeometry(40, 200);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0d0000,
  roughness: 0.95,
  metalness: 0.1,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -3.5;
floor.position.z = -46;
scene.add(floor);

// ── GRID ON FLOOR ──
const gridHelper = new THREE.GridHelper(200, 40, 0x3d0000, 0x1a0000);
gridHelper.position.y = -3.49;
gridHelper.position.z = -46;
scene.add(gridHelper);

// ── CEILING ──
const ceilGeo = new THREE.PlaneGeometry(40, 200);
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x080000, roughness: 1 });
const ceil = new THREE.Mesh(ceilGeo, ceilMat);
ceil.rotation.x = Math.PI / 2;
ceil.position.y = 6;
ceil.position.z = -46;
scene.add(ceil);

// ── WALLS ──
function makeWall(x, rotY, zOffset) {
  const geo = new THREE.PlaneGeometry(200, 12);
  const mat = new THREE.MeshStandardMaterial({ color: 0x100000, roughness: 0.9, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.y = rotY;
  mesh.position.set(x, 1, zOffset);
  scene.add(mesh);
}
makeWall(-14, Math.PI / 2, -46);
makeWall( 14, -Math.PI / 2, -46);

// ── EXHIBIT MARKERS (glowing frames in 3D space) ──
POSITIONS.forEach((pos, i) => {
  // Glowing frame
  const frameGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(3.8, 5.2, 0.05));
  const frameMat = new THREE.LineBasicMaterial({ color: 0x8b0000, transparent: true, opacity: 0.6 });
  const frame = new THREE.LineSegments(frameGeo, frameMat);
  frame.position.copy(pos);
  scene.add(frame);

  // Spotlight per exhibit
  const spot = new THREE.PointLight(0x8b0000, 1.5, 18);
  spot.position.set(pos.x, pos.y + 3, pos.z + 1);
  scene.add(spot);

  // Floor marker
  const markerGeo = new THREE.CircleGeometry(0.6, 4);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0x3d0000, transparent: true, opacity: 0.4 });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  marker.rotation.x = -Math.PI / 2;
  marker.position.set(pos.x, -3.48, pos.z);
  scene.add(marker);
});

// ── PARTICLES (dust/spores) ──
const particleCount = 300;
const particleGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  pPos[i * 3]     = (Math.random() - 0.5) * 26;
  pPos[i * 3 + 1] = (Math.random() - 0.5) * 8 + 1;
  pPos[i * 3 + 2] = Math.random() * -96 - 2;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x8b0000, size: 0.06, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ── STATE ──
let current = 0;
let isAnimating = false;
const CAM_OFFSET = new THREE.Vector3(0, 0.4, 5);

// ── HUD DOTS ──
const dotsContainer = document.getElementById('hud-dots');
RELEASES.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'hud-dot' + (i === 0 ? ' active' : '');
  dotsContainer.appendChild(dot);
});

function updateDots() {
  document.querySelectorAll('.hud-dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

// ── IFRAME ──
const iframeContainer = document.getElementById('iframe-container');
const activeIframe    = document.getElementById('active-iframe');
const counterNum      = document.getElementById('counter-num');
const counterTitle    = document.getElementById('counter-title');

function showRelease(index) {
  const rel = RELEASES[index];
  activeIframe.style.height = rel.h + 'px';
  activeIframe.src = rel.src;
  counterNum.textContent = String(index + 1).padStart(2, '0') + ' / 12';
  counterTitle.textContent = rel.title;
  iframeContainer.classList.add('visible');
}

// ── CAMERA ANIMATION ──
function flyTo(index, onDone) {
  if (isAnimating) return;
  isAnimating = true;

  iframeContainer.classList.remove('visible');

  const target = POSITIONS[index].clone().add(CAM_OFFSET);
  const startPos = camera.position.clone();
  const startLook = new THREE.Vector3(
    camera.position.x, camera.position.y, camera.position.z - 1
  );
  const endLook = POSITIONS[index].clone();

  const duration = 1400;
  const startTime = performance.now();

  function tick(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // ease in-out cubic
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    camera.position.lerpVectors(startPos, target, e);

    const look = new THREE.Vector3();
    look.lerpVectors(startLook, endLook, e);
    camera.lookAt(look);

    // update coord display
    document.getElementById('cx').textContent = camera.position.x.toFixed(2);
    document.getElementById('cy').textContent = camera.position.y.toFixed(2);
    document.getElementById('cz').textContent = camera.position.z.toFixed(2);

    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      camera.lookAt(POSITIONS[index]);
      isAnimating = false;
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(tick);
}

function navigate(dir) {
  if (isAnimating) return;
  const next = (current + dir + RELEASES.length) % RELEASES.length;
  current = next;
  updateDots();
  flyTo(current, () => showRelease(current));
}

// ── BUTTONS ──
document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
document.getElementById('btn-next').addEventListener('click', () => navigate(1));

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// ── RESIZE ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── RENDER LOOP ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Subtle camera sway when idle
  if (!isAnimating) {
    const target = POSITIONS[current];
    const base = target.clone().add(CAM_OFFSET);
    camera.position.x = base.x + Math.sin(t * 0.3) * 0.08;
    camera.position.y = base.y + Math.sin(t * 0.2) * 0.05;
    camera.lookAt(target);
  }

  // Particle drift
  const pArray = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pArray[i * 3 + 1] += Math.sin(t + i) * 0.0008;
  }
  particleGeo.attributes.position.needsUpdate = true;

  // Pulsing fog
  scene.fog.density = 0.022 + Math.sin(t * 0.5) * 0.002;

  renderer.render(scene, camera);
}
animate();

// ── INIT: fly to first position ──
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
  flyTo(0, () => showRelease(0));
}, 1800);
</script>
</body>
</html>
